<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversor Inteligente</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<button class="tema" onclick="alternarTema()">🌙 / ☀️</button>

<div class="container">

<h1 class="titulo">🔄 Conversor Inteligente</h1>

<input type="number" id="valor" placeholder="Digite um valor">

<select id="tipo">

<optgroup label="🌡️ Temperatura">
<option value="c_f">Celsius → Fahrenheit</option>
<option value="f_c">Fahrenheit → Celsius</option>
<option value="c_k">Celsius → Kelvin</option>
<option value="k_c">Kelvin → Celsius</option>
</optgroup>

<optgroup label="📏 Distância">
<option value="km_mi">Km → Milhas</option>
<option value="mi_km">Milhas → Km</option>
<option value="m_cm">Metros → Centímetros</option>
<option value="cm_m">Centímetros → Metros</option>
<option value="m_ft">Metros → Pés</option>
<option value="ft_m">Pés → Metros</option>
</optgroup>

<optgroup label="⚖️ Peso">
<option value="kg_lb">Kg → Libras</option>
<option value="lb_kg">Libras → Kg</option>
<option value="kg_g">Kg → Gramas</option>
<option value="g_kg">Gramas → Kg</option>
</optgroup>

<optgroup label="💾 Armazenamento">
<option value="mb_gb">MB → GB</option>
<option value="gb_mb">GB → MB</option>
<option value="gb_tb">GB → TB</option>
<option value="tb_gb">TB → GB</option>
</optgroup>

<optgroup label="⏱️ Tempo">
<option value="min_h">Minutos → Horas</option>
<option value="h_min">Horas → Minutos</option>
<option value="h_s">Horas → Segundos</option>
<option value="s_h">Segundos → Horas</option>
</optgroup>

<optgroup label="💰 Moeda">
<option value="brl_usd">Real → Dólar</option>
<option value="usd_brl">Dólar → Real</option>
</optgroup>

</select>

<div class="botoes">

<button onclick="converter()">Converter</button>
<button onclick="inverter()">🔁 Inverter</button>
<button onclick="favoritar()">⭐ Favoritar</button>

</div>

<div class="resultado" id="resultado"></div>

<h3>⭐ Favoritos</h3>
<div id="favoritos"></div>

<h3>📜 Histórico</h3>
<button class="limpar" onclick="limparHistorico()">🧹 Limpar histórico</button>
<div id="historico"></div>

</div>

<script src="script.js"></script>

</body>
</html>
